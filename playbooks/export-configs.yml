---
- name: Export controller 2.4 or AWX configs
  hosts: localhost
  connection: local
  gather_facts: False
  vars:
    personal_access_token: "{{ lookup('ansible.builtin.env', 'GITHUB_TOKEN') }}"
    software_repository: https://{{ personal_access_token }}@github.com/taiseerhussein/export-import-aap-assets.git
    # personal_access_token: git_hub_token
    local_repo: /var/tmp/github/aap24-configuration.kit
    git_name: taiseerhussein
    git_email: tkhussein@yahoo.com
    awx_or_aap: "{{ config_dir }}"
    merged_hosts_file: "{{ config_dir }}/merged/controller_hosts.yaml"
    # /var/tmp/github/aap24-configuration.kit/aap24-hosts_configs/hosts.yaml
    hosts_file: "{{ local_repo }}/{{ awx_or_aap }}_configs/hosts.yaml"
  tasks:

    # fail with good error for Automation controller user
    - name: Determine that both AAP and Machine credentials are set
      ansible.builtin.assert:
        that:
          - "lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') !=''"
          - "lookup('ansible.builtin.env', 'CONTROLLER_HOST') !=''"
          - "lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') !=''"
        fail_msg:
          - "Red Hat Ansible Automation Platform credential is not set"
          - "Please assign correct credentials to the Job Template"

    - name: Create a new token
      ansible.controller.token:
        controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') }}"
        controller_username: "{{ lookup('ansible.builtin.env', 'CONTROLLER_USERNAME') }}"
        controller_password: "{{ lookup('ansible.builtin.env', 'CONTROLLER_PASSWORD') }}"
        validate_certs: false
        description: Controller export
        scope: write
        state: present

    - name: Printout my token
      ansible.builtin.debug:
        msg:
          - "{{ ansible_facts['controller_token']['token'] }}"

    - name: "Set the oauth token to be used since now"
      ansible.builtin.set_fact:
        controller_oauthtoken: "{{ ansible_facts['controller_token']['token'] }}"

    - name: Set controller_validate_certs
      ansible.builtin.set_fact:
        controller_validate_certs: false

    - name: Set controller_hostname
      ansible.builtin.set_fact:
        controller_hostname: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') }}"

    - name: Clone the software repository
      register: clone_result
      run_once: true
      when: software_repository is defined
      ansible.builtin.git:
        repo: "{{ software_repository }}"
        dest: "{{ local_repo }}"
        accept_hostkey: true
        force: true
        version: main

    - name: Create a directory if it does not exist
      ansible.builtin.file:
        path: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        state: directory
        mode: '0755'


    - name: Clean previous export directory
      ansible.builtin.file:
        path: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        state: absent

    - name: Recreate export directory
      ansible.builtin.file:
        path: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        state: directory
        mode: "0755"

    - name: Export all objects
      vars:
        output_path: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        flatten_output: true
        input_tag:
          - all
        valid_tags:
          - all
          # - settings
          - credentials
          - credential_types
          - execution_environments
          - groups
          - hosts
          - inventory
          - inventory_sources
          - job_templates
          - notification_templates
          - organizations
          - projects
          - roles
          - teams
          - users
          - workflow_job_templates
          - instance_groups
          - applications
          - labels
          - schedules
      ansible.builtin.include_role:
        name: infra.controller_configuration.filetree_create

    - name: Find normalized YAML files
      ansible.builtin.find:
        paths: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        patterns:
          - "*.yml"
          - "*.yaml"
        file_type: file
      register: normalized_yaml_files

    - name: Replace ORGANIZATIONLESS with Default
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: 'ORGANIZATIONLESS'
        replace: 'Default'
      loop: "{{ normalized_yaml_files.files  }}"

    - name: Remove inline !unsafe tag
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '!unsafe\s*'
        replace: ''
      loop: "{{ normalized_yaml_files.files }}"
    - name: Find exported host files
      ansible.builtin.find:
        paths: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        patterns: "hosts.yaml"
        recurse: true
      register: host_files
    - name: Debug print list of files
      ansible.builtin.debug:
        msg: "{{ host_files }}"


    - name: Initialize merged list
      ansible.builtin.set_fact:
        merged_controller_hosts: []

    - name: Merge controller_hosts from files
      ansible.builtin.set_fact:
        merged_controller_hosts: >-
          {{
            merged_controller_hosts
            +
            (
              (lookup('file', item.path) | from_yaml_all | list)
              | selectattr('controller_hosts', 'defined')
              | map(attribute='controller_hosts')
              | flatten
            )
          }}
      loop: "{{ host_files.files }}"

    - name: Create merged directory
      ansible.builtin.file:
        path: "{{ merged_hosts_file | dirname }}"
        state: directory
        mode: "0755"

    - name: Write merged hosts file
      ansible.builtin.copy:
        dest: "{{ merged_hosts_file }}"
        mode: "0644"
        content: |
          ---
          controller_hosts:
          {{ merged_controller_hosts | to_nice_yaml(indent=2) | indent(2, true) }}

    - name: Read hosts.yaml and remove !unsafe tag
      ansible.builtin.set_fact:
        hosts_file_content: "{{ lookup('file', hosts_file) | regex_replace('!unsafe ', '') }}"

    - name: Parse all YAML documents
      ansible.builtin.set_fact:
        hosts_documents: "{{ hosts_file_content | from_yaml_all | list }}"

    - name: Merge controller_hosts into one real list
      ansible.builtin.set_fact:
        merged_controller_hosts: "{{ hosts_documents | selectattr('controller_hosts', 'defined') | map(attribute='controller_hosts') | flatten | list }}"

    - name: Rewrite hosts.yaml as single YAML document
      ansible.builtin.copy:
        dest: "{{ hosts_file }}"
        mode: "0644"
        content: |
          ---
          controller_hosts:
          {{ merged_controller_hosts | to_nice_yaml(indent=2) | indent(2, true) }}

    - name: Find files starting with current_
      ansible.builtin.find:
        paths: "{{ local_repo }}/{{ awx_or_aap }}_configs"
        patterns: "current_*"
        recurse: true
        file_type: file
      register: current_files

    - name: Rename files and remove current_ prefix
      ansible.builtin.command:
        cmd: >-
          mv "{{ item.path }}"
          "{{ item.path | dirname }}/{{ item.path | basename | regex_replace('^current_', '') }}"
      loop: "{{ current_files.files }}"
      changed_when: true



    - name: Add any new playbooks to the software_repository
      changed_when: false
      run_once: true
      args:
        chdir: "{{ local_repo }}"
      ansible.builtin.shell: git add *

    - name: Get the status of the repository
      register: status_results
      changed_when: false
      ignore_errors: true
      run_once: true
      args:
        chdir: "{{ local_repo }}"
      ansible.builtin.shell: git status

    - name: Commit the changes
      when: status_results.stdout is search('Changes')
      run_once: true
      environment:
        GIT_COMMITTER_NAME: "{{ git_name | default(omit) }}"
        GIT_COMMITTER_EMAIL: "{{ git_email | default(omit) }}"
        GIT_AUTHOR_NAME: "{{ git_name | default(omit) }}"
        GIT_AUTHOR_EMAIL: "{{ git_email | default(omit) }}"
      args:
        chdir: "{{ local_repo }}"
      ansible.builtin.shell: git commit -am 'Changed'

    - name: Push the changes
      run_once: true
      when: software_repository is defined
      args:
        chdir: "{{ local_repo }}"
      ansible.builtin.shell: git push

    - name: Remove my token
      ansible.controller.token:
        controller_host: "{{ lookup('ansible.builtin.env', 'CONTROLLER_HOST') }}"
        existing_token: "{{ ansible_facts['controller_token'] }}"
        controller_oauthtoken: "{{ ansible_facts['controller_token']['token'] }}"
        validate_certs: false
        state: absent
