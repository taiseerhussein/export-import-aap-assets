---
controller_credential_types:
  - name: "github_token"
    description: ""
    kind: "cloud"
    inputs:
      fields:
      - id: github_token
        type: string
        label: GitHub Personal Access Token
        secret: true
        help_text: Paste your GitHub PAT here.
      required:
      - github_token

    injectors:
      env:
        GITHUB_TOKEN: '{{ github_token }}'
...
